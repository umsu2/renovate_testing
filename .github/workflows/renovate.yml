name: Renovate
on:
  # Allows manual trigger from the Actions tab
  workflow_dispatch:
  # Runs at 00:00 every day
  schedule:
    - cron: '0 0 * * *'

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.4
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          # Use the same token for fetching changelogs to avoid rate limits
          GITHUB_COM_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_REPOSITORIES: '["${{ github.repository }}"]'
          LOG_LEVEL: "debug"
          RENOVATE_HOST_RULES: '[{"matchHost": "dhi.io", "username": "${{ secrets.DHI_USERNAME }}", "password": "${{ secrets.DHI_PASSWORD }}"}]'