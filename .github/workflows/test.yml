name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
    - uses: actions/checkout@v6

    - name: Login to dhi.io
      uses: docker/login-action@v4
      with:
        registry: dhi.io
        username: ${{ secrets.DHI_USERNAME }}
        password: ${{ secrets.DHI_PASSWORD }}

    - name: Build and Test via Docker Builder
      run: docker run --rm $(docker build -q --target builder .) go test -v -race ./...

    - name: Build final image for scanning
      run: docker build -t my-app:latest .

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.35.0
      with:
        image-ref: 'my-app:latest'
        format: 'sarif'
        output: 'trivy-results.sarif'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
        limit-severities-for-sarif: true

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
